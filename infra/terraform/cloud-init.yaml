#cloud-config
# Tribes.app Production Server Bootstrap
# Runs once on first boot via Hetzner cloud-init

package_update: true
package_upgrade: true

packages:
  - docker.io
  - docker-compose-v2
  - restic
  - ufw
  - curl
  - git
  - jq

# Create deploy user
users:
  - name: ${deploy_user}
    groups: [docker, sudo]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys: []   # SSH key added via Hetzner (not here)

# Configure UFW firewall (belt-and-suspenders with Hetzner firewall)
runcmd:
  # Docker
  - systemctl enable docker
  - systemctl start docker

  # App directory
  - mkdir -p /opt/tribes /opt/tribes/data /backups/restic-repo
  - chown -R ${deploy_user}:${deploy_user} /opt/tribes /backups

  # UFW rules (Hetzner firewall is the primary layer, UFW is belt-and-suspenders)
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw allow 22/tcp
  - ufw --force enable

  # Swap (prevents OOM on 8GB with all services running)
  - fallocate -l 2G /swapfile
  - chmod 600 /swapfile
  - mkswap /swapfile
  - swapon /swapfile
  - echo '/swapfile none swap sw 0 0' | tee -a /etc/fstab

  # Set swappiness low (prefer RAM, only use swap for emergencies)
  - sysctl vm.swappiness=10
  - echo 'vm.swappiness=10' >> /etc/sysctl.conf

  # Docker log rotation
  - |
    cat > /etc/docker/daemon.json << 'EOF'
    {
      "log-driver": "json-file",
      "log-opts": {
        "max-size": "50m",
        "max-file": "5"
      }
    }
    EOF
  - systemctl restart docker

  # Nightly backup cron (runs at 3am UTC)
  - echo "0 3 * * * ${deploy_user} /opt/tribes/scripts/backup.sh >> /var/log/tribes-backup.log 2>&1" > /etc/cron.d/tribes-backup
  - chmod 644 /etc/cron.d/tribes-backup
