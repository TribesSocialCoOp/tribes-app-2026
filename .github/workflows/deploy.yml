name: Tribes Production CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Typecheck
        run: npm run typecheck

      - name: Run Unit Tests
        run: npm run test

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH Agent with Passphrase
        env:
          SSH_PASSPHRASE: ${{ secrets.PROD_KEY_PASSPHRASE }}
          SSH_PRIVATE_KEY: ${{ secrets.PROD_KEY }}
        run: |
          mkdir -p ~/.ssh
          eval $(ssh-agent -s)
          printf '%s\n' "echo \"\$SSH_PASSPHRASE\"" > ~/.ssh_askpass
          chmod +x ~/.ssh_askpass
          printf '%s\n' "$SSH_PRIVATE_KEY" | DISPLAY=None SSH_ASKPASS=~/.ssh_askpass ssh-add -
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV


      - name: Execute Deploy Script
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          # Overwrite deploy host parameters from GitHub secrets
          sed -i "s/REMOTE_HOST=.*/REMOTE_HOST=\"$PROD_USER@$PROD_HOST\"/" ./scripts/deploy.sh
          ./scripts/deploy.sh
