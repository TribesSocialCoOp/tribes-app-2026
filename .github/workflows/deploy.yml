name: deploy

# Production deploy — runs on push to main and delegates to the shared
# pipeline in deploy-reusable.yml. Prod secret names are unchanged.

on:
  push:
    branches:
      - main

jobs:
  deploy-production:
    uses: ./.github/workflows/deploy-reusable.yml
    with:
      environment_name: production
    secrets:
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      HCLOUD_FIREWALL_ID: ${{ secrets.HCLOUD_FIREWALL_ID }}
      DEPLOY_HOST: ${{ secrets.PROD_HOST }}
      DEPLOY_USER: ${{ secrets.PROD_USER }}
      DEPLOY_KEY: ${{ secrets.PROD_KEY }}
      DEPLOY_KEY_PASSPHRASE: ${{ secrets.PROD_KEY_PASSPHRASE }}
      FCM_SERVICE_ACCOUNT_JSON: ${{ secrets.FCM_SERVICE_ACCOUNT_JSON }}
      APNS_PUSH_P12_BASE64: ${{ secrets.APNS_PUSH_P12_BASE64 }}
